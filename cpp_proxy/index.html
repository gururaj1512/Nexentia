<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Flow Visualizer</title>
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2333;
      --border: #2a3045;
      --border-bright: #3a4560;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --accent-glow: rgba(79,142,247,0.35);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.1);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.1);
      --yellow: #fbbf24;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      padding: 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-dim);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }
    .badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(52,211,153,0.2);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Flow nodes */
    .flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 1.75rem;
    }

    .node {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .3s, background .3s, box-shadow .3s;
      position: relative;
      overflow: hidden;
    }
    .node::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: linear-gradient(135deg, var(--accent-dim), transparent);
      transition: opacity .3s;
      pointer-events: none;
    }
    .node.active {
      border-color: rgba(79,142,247,0.5);
      box-shadow: 0 0 0 1px rgba(79,142,247,0.15), 0 4px 24px rgba(79,142,247,0.12);
    }
    .node.active::before { opacity: 1; }

    .node-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .3s, background .3s;
      position: relative;
      z-index: 1;
    }
    .node.active .node-icon {
      border-color: rgba(79,142,247,0.4);
      background: var(--accent-dim);
    }
    .node-info { flex: 1; position: relative; z-index: 1; }
    .node-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .node-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }
    .node-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-bright);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      transition: background .3s;
    }
    .node.active .node-status {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    @keyframes ping {
      0% { transform: scale(1); opacity: .7; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .node.active .node-status::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--accent);
      animation: ping .9s ease-out infinite;
    }

    /* Connector */
    .connector {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 40px;
      position: relative;
      z-index: 0;
    }
    .connector-track {
      width: 1px;
      flex: 1;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }
    @keyframes slide-dn {
      0% { top: -6px; opacity: 1; }
      80% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    @keyframes slide-up {
      0% { bottom: -6px; opacity: 1; }
      80% { opacity: 1; }
      100% { bottom: 100%; opacity: 0; }
    }
    .connector-dot {
      position: absolute;
      left: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      transform: translateX(-50%);
      opacity: 0;
      box-shadow: 0 0 6px var(--accent-glow);
    }
    .connector.anim-dn .connector-dot { animation: slide-dn .5s ease-in forwards; }
    .connector.anim-up .connector-dot { top: auto; animation: slide-up .5s ease-in forwards; }
    .connector-tip {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--border);
    }

    /* Controls */
    .controls { display: flex; gap: 8px; margin-bottom: 1.5rem; }

    .btn-primary {
      flex: 1;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      letter-spacing: -0.01em;
      box-shadow: 0 2px 12px rgba(79,142,247,0.35);
    }
    .btn-primary:hover { opacity: .9; box-shadow: 0 4px 18px rgba(79,142,247,0.45); }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border-bright); }

    /* Log */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .log-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .log-count {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }
    .log-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      line-height: 1.7;
    }
    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-empty { color: var(--muted); text-align: center; padding: 1.5rem 0; font-size: 12px; }
    .log-row { display: flex; gap: 10px; }
    .log-time { color: var(--muted); flex-shrink: 0; min-width: 58px; }
    .log-row.info .log-msg { color: #94a3b8; }
    .log-row.ok   .log-msg { color: var(--green); }
    .log-row.err  .log-msg { color: var(--red); }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 2L15 5.5V12.5L9 16L3 12.5V5.5L9 2Z" stroke="#4f8ef7" stroke-width="1.2" fill="none"/>
        <circle cx="9" cy="9" r="2" fill="#4f8ef7"/>
      </svg>
    </div>
    <div>
      <h1>Proxy Flow Visualizer</h1>
      <p>Real-time request lifecycle inspector</p>
    </div>
    <span class="badge" id="status-badge">idle</span>
  </div>

  <div class="flow">

    <div class="node" id="node-client">
      <div class="node-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="3" width="14" height="10" rx="2" stroke="#64748b" stroke-width="1.1"/>
          <path d="M6 13v2M12 13v2M5 15h8" stroke="#64748b" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="node-info">
        <div class="node-name">Client</div>
        <div class="node-desc">HTTP request origin</div>
      </div>
      <div class="node-status"></div>
    </div>

    <div class="connector" id="con1">
      <div class="connector-track"><div class="connector-dot"></div></div>
      <div class="connector-tip"></div>
    </div>

    <div class="node" id="node-proxy">
      <div class="node-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="6" stroke="#64748b" stroke-width="1.1"/>
          <path d="M9 6v3.5l2.5 1.5" stroke="#64748b" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="node-info">
        <div class="node-name">C++ Proxy</div>
        <div class="node-desc">Middleware interceptor</div>
      </div>
      <div class="node-status"></div>
    </div>

    <div class="connector" id="con2">
      <div class="connector-track"><div class="connector-dot"></div></div>
      <div class="connector-tip"></div>
    </div>

    <div class="node" id="node-backend">
      <div class="node-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="4" width="14" height="4" rx="1.2" stroke="#64748b" stroke-width="1.1"/>
          <rect x="2" y="10" width="14" height="4" rx="1.2" stroke="#64748b" stroke-width="1.1"/>
          <circle cx="13.5" cy="6" r=".9" fill="#64748b"/>
          <circle cx="13.5" cy="12" r=".9" fill="#64748b"/>
        </svg>
      </div>
      <div class="node-info">
        <div class="node-name">Backend</div>
        <div class="node-desc">localhost:3000</div>
      </div>
      <div class="node-status"></div>
    </div>

  </div>

  <div class="controls">
    <button class="btn-primary" id="btn-send" onclick="sendRequest()">Send Request →</button>
    <button class="btn-ghost" onclick="clearLog()">Clear</button>
  </div>

  <div class="log-header">
    <span class="log-label">Request Log</span>
    <span class="log-count" id="log-count">0 entries</span>
  </div>
  <div class="log-panel" id="log-panel">
    <div class="log-empty" id="log-empty">No requests yet — hit Send to begin</div>
  </div>

</div>

<script>
  let entryCount = 0;

  function ts() {
    return new Date().toTimeString().slice(0, 8);
  }

  function setActive(id, on) {
    document.getElementById(id).classList.toggle('active', on);
  }

  function animateConnector(id, dir) {
    const c = document.getElementById(id);
    c.classList.remove('anim-dn', 'anim-up');
    void c.offsetWidth;
    c.classList.add(dir === 'dn' ? 'anim-dn' : 'anim-up');
    setTimeout(() => c.classList.remove('anim-dn', 'anim-up'), 550);
  }

  function log(msg, cls = 'info') {
    const panel = document.getElementById('log-panel');
    const empty = document.getElementById('log-empty');
    if (empty) empty.remove();
    entryCount++;
    document.getElementById('log-count').textContent = entryCount + ' entr' + (entryCount === 1 ? 'y' : 'ies');
    const row = document.createElement('div');
    row.className = 'log-row ' + cls;
    row.innerHTML = `<span class="log-time">${ts()}</span><span class="log-msg">${msg}</span>`;
    panel.appendChild(row);
    panel.scrollTop = panel.scrollHeight;
  }

  function clearLog() {
    entryCount = 0;
    document.getElementById('log-count').textContent = '0 entries';
    document.getElementById('log-panel').innerHTML = '<div class="log-empty" id="log-empty">No requests yet — hit Send to begin</div>';
  }

  function setBadge(text, color) {
    const b = document.getElementById('status-badge');
    b.textContent = text;
    b.style.background = color === 'green' ? 'rgba(52,211,153,0.1)' : color === 'blue' ? 'rgba(79,142,247,0.12)' : 'rgba(248,113,113,0.1)';
    b.style.color = color === 'green' ? '#34d399' : color === 'blue' ? '#4f8ef7' : '#f87171';
    b.style.borderColor = color === 'green' ? 'rgba(52,211,153,0.2)' : color === 'blue' ? 'rgba(79,142,247,0.3)' : 'rgba(248,113,113,0.2)';
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function sendRequest() {
    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    setBadge('active', 'blue');

    try {
      setActive('node-client', true);
      log('→ Client initiating request');
      await wait(300);

      animateConnector('con1', 'dn');
      await wait(420);

      setActive('node-proxy', true);
      log('→ Proxy intercepted — forwarding upstream');
      await wait(300);

      animateConnector('con2', 'dn');
      await wait(420);

      setActive('node-backend', true);
      log('→ Backend received request');

      const res = await fetch('http://127.0.0.1:3000/');
      const data = await res.text();

      log('← 200 OK — ' + data.slice(0, 72), 'ok');
      await wait(250);

      setActive('node-backend', false);
      animateConnector('con2', 'up');
      await wait(420);

      setActive('node-proxy', false);
      log('← Proxy relaying response to client');
      animateConnector('con1', 'up');
      await wait(420);

      setActive('node-client', false);
      log('✓ Round-trip complete', 'ok');
      setBadge('200 OK', 'green');

    } catch (err) {
      log('✗ ' + err.message, 'err');
      ['node-client', 'node-proxy', 'node-backend'].forEach(id => setActive(id, false));
      setBadge('error', 'red');
    }

    btn.disabled = false;
  }
</script>

</body>
</html>
